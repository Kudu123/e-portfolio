<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Inquiries | Edwin Thomas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="portfolio.css">
    <script src="https://kit.fontawesome.com/c056c12f2e.js" crossorigin="anonymous"></script>
</head>
<body class="admin-body">

    <div id="pin-overlay" class="pin-overlay">
        <div class="pin-box">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: green; margin-bottom: 20px;"></i>
            <h3>Admin Access</h3>
            <input type="password" id="admin-pin" placeholder="****" maxlength="4">
            <button onclick="checkPin()" class="btn">Login</button>
            <p id="pin-error" style="color: #ff4d4d; margin-top: 10px; display: none;">Invalid PIN.</p>
        </div>
    </div>

    <i class="fa-solid fa-bars open-icon" onclick="openmenu()"></i>

    <nav class="sidebar-container" id="sidemenu">
        <div class="sidebar-content">
            <div class="logo">
                <h1>ADMIN<span>.</span></h1>
            </div>
            
            <i class="fa-solid fa-xmark close-icon" onclick="closemenu()"></i>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a></li>
                <li><a href="javascript:location.reload()"><i class="fa-solid fa-rotate"></i><span>Refresh</span></a></li>
            </ul>
        </div>
        
        <div class="sidebar-footer">
            <a href="https://github.com/EdwinThomas" target="_blank"><i class="fa-brands fa-github"></i></a>
        </div>
    </nav>

    <div class="main-content" id="protected-content" style="display: none;">
        <div class="container">
            <h1 class="sub-title">Contact Inquiries</h1>
            <div class="table-responsive inquiry-table">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Use a variable to track the element
        var sidemenu = document.getElementById("sidemenu");

        function openmenu() { 
            sidemenu.style.right = "0"; 
        }

        function closemenu() { 
            sidemenu.style.right = "-250px"; 
        }

        const CORRECT_PIN = "1234"; // Update your PIN here
        const scriptURL = 'YOUR_DEPLOYED_URL_HERE'; 

        function checkPin() {
            const userPin = document.getElementById("admin-pin").value;
            if (userPin === CORRECT_PIN) {
                document.getElementById("pin-overlay").style.display = "none";
                document.getElementById("protected-content").style.display = "block";
                fetchInquiries();
            } else {
                document.getElementById("pin-error").style.display = "block";
                document.getElementById("admin-pin").value = "";
            }
        }

        async function fetchInquiries() {
            const tableBody = document.getElementById('data-table');
            tableBody.innerHTML = '<tr><td colspan="3" class="text-center">Loading...</td></tr>';
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                tableBody.innerHTML = ''; 
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row.Name || 'N/A'}</td><td>${row.Email || 'N/A'}</td><td>${row.Message || 'N/A'}</td>`;
                    tableBody.appendChild(tr);
                });
            } catch (e) {
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Fetch Error. Check Script URL.</td></tr>';
            }
        }
    </script>
</body>
</html>
